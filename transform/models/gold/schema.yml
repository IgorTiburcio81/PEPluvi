version: 2

models:
  - name: qualidade_estacoes
    description: >
      Perfil de qualidade de dados por estação pluviométrica, computado sobre
      todo o histórico disponível (1961 → hoje). Indica confiabilidade para uso
      em análises e dashboards.
    columns:
      - name: codigo_estacao
        tests:
          - unique
          - not_null
      - name: nome_estacao
        tests:
          - not_null
      - name: municipio
        tests:
          - not_null
      - name: mesorregiao
        tests:
          - not_null
          - accepted_values:
              values:
                - 'Metropolitana de Recife'
                - 'Zona da Mata'
                - 'Agreste'
                - 'Sertão do São Francisco'
                - 'Sertão'
      - name: total_registros
        tests:
          - not_null
      - name: registros_validos
        tests:
          - not_null
      - name: registros_nulos
        tests:
          - not_null
      - name: score_confianca
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
      - name: categoria_qualidade
        tests:
          - not_null
          - accepted_values:
              values: ['alta', 'media', 'baixa']
      - name: estacao_confiavel
        tests:
          - not_null
      - name: atualizado_em
        tests:
          - not_null


  - name: agregados_anuais
    description: >
      Agregados anuais de precipitação por estação. Inclui total anual,
      média histórica, desvio, percentil e classificação do ano (Seco / Normal / Chuvoso).
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - codigo_estacao
            - ano
    columns:
      - name: codigo_estacao
        tests:
          - not_null
      - name: ano
        tests:
          - not_null
      - name: nome_estacao
        tests:
          - not_null
      - name: municipio
        tests:
          - not_null
      - name: mesorregiao
        tests:
          - not_null
          - accepted_values:
              values:
                - 'Metropolitana de Recife'
                - 'Zona da Mata'
                - 'Agreste'
                - 'Sertão do São Francisco'
                - 'Sertão'
      - name: total_anual_mm
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
      - name: percentil_anual
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 100
      - name: classificacao_ano
        tests:
          - not_null
          - accepted_values:
              values: ['Ano Seco', 'Ano Normal', 'Ano Chuvoso']

  - name: ranking_eventos_extremos
    description: >
      Ranking de eventos extremos de precipitação diária por estação e mesorregião.
      Inclui apenas dias com chuva registrada (precipitacao_mm > 0).
    columns:
      - name: codigo_estacao
        tests:
          - not_null
      - name: data
        tests:
          - not_null
      - name: precipitacao_mm
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: false
      - name: percentil_estacao
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 100
      - name: mesorregiao
        tests:
          - not_null
          - accepted_values:
              values:
                - 'Metropolitana de Recife'
                - 'Zona da Mata'
                - 'Agreste'
                - 'Sertão do São Francisco'
                - 'Sertão'
      - name: severidade
        tests:
          - not_null
          - accepted_values:
              values:
                - 'Evento Histórico (top 1%)'
                - 'Muito Extremo (top 5%)'
                - 'Extremo (top 10%)'
                - 'Severo (top 25%)'
                - 'Significativo'

  - name: comparativo_sazonal
    description: >
      VIEW que compara precipitação mensal do ano corrente com a média dos
      últimos 5 anos por mesorregião. Recalculada a cada execução com CURRENT_DATE.
    columns:
      - name: mes
        tests:
          - not_null
      - name: mesorregiao
        tests:
          - not_null
          - accepted_values:
              values:
                - 'Metropolitana de Recife'
                - 'Zona da Mata'
                - 'Agreste'
                - 'Sertão do São Francisco'
                - 'Sertão'
      - name: status_sazonal
        tests:
          - not_null
          - accepted_values:
              values:
                - 'Sem dados'
                - 'Acima do máximo histórico'
                - 'Abaixo do mínimo histórico'
                - 'Acima da média'
                - 'Abaixo da média'
                - 'Dentro da normalidade'

  - name: data_cemaden_leituras_15min
    description: >
      Série temporal completa dos dados de chuva do CEMADEN em granularidade de 15 minutos.
      Desnormalizada com atributos dimensionais da estação (nome, município, lat/lon, código IBGE).
      Atualização incremental com lookback de 24h para absorver dados atrasados (late data).
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - estacao_codigo
            - data_hora
    columns:
      - name: estacao_codigo
        tests:
          - not_null
      - name: data_hora
        tests:
          - not_null
      - name: nome_estacao
        tests:
          - not_null
      - name: municipio
        tests:
          - not_null
      - name: chuva
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true

  - name: data_cemaden_acumulados
    description: >
      Para cada estação e cada timestamp de 15 min, os acumulados de chuva nas janelas
      de 15min, 1h, 3h, 6h, 12h e 24h. Todos os atributos dimensionais da estação embutidos.
      Retorna NULL quando o número de leituras consecutivas é insuficiente para preencher
      a janela (ex: estação offline). Atualização incremental com lookback de 24h.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - estacao_codigo
            - data_hora
    columns:
      - name: estacao_codigo
        tests:
          - not_null
      - name: data_hora
        tests:
          - not_null
      - name: chuva_15min
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true
      - name: chuva_1h
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true
      - name: chuva_3h
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true
      - name: chuva_6h
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true
      - name: chuva_12h
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true
      - name: chuva_24h
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true

